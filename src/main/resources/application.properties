spring.datasource.url=jdbc:h2:mem:festivaldb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Festival operating hours for AOP rule check
festival.start-date=2025-08-01
festival.end-date=2025-08-03
festival.open-time=10:00
festival.close-time=23:00

springdoc.api-docs.path=/api-docs